# Requires the test to pass a codex_lane_flag_path override pointing at an
# existing tmp file, so only the write_scope-sandbox-mapping check is under
# test here. An unbounded glob is not expressible as a single codex sandbox.
schema_version: 2
nodes:
  - node_id: N1
    depends_on: []
    downstream_consumers: []
    agent_persona: pipeline-async
    goal: "Confirm an unbounded write_scope glob is rejected for executor: codex."
    context_files: []
    acceptance_criteria: ["an unbounded **/* write_scope glob is invalid for executor: codex"]
    verification_method:
      type: command
      command: "echo ok"
    risk_tier: T1
    skills_required: [agent-protocol]
    do_not_touch: []
    write_scope: ["**/*"]
    executor: codex
    executor_model: gpt-5.4
    irreversible: false
